    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding-top: 80px; display: none; }
        nav { background: #2c3e50; padding: 15px; text-align: center; position: fixed; top: 0; width: 100%; z-index: 9999; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .admin-container { max-width: 900px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #c0392b; border-bottom: 2px solid #c0392b; padding-bottom: 10px; margin-bottom: 20px; }
        .review-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 10px; background: #fff; position: relative; }
        .card-top { display: flex; justify-content: space-between; align-items: start; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge-pending { background: #ffeaa7; color: #d35400; }
        .badge-verified { background: #55efc4; color: #00b894; }
        .grid-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; font-size: 13px; color: #555; }
        .action-bar { display: flex; gap: 10px; margin-top: 15px; justify-content: flex-end; flex-wrap: wrap; }
        button { padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.3s; }
        .btn-delete { background: #e74c3c; color: white; }
        .btn-verify { background: #27ae60; color: white; }
        .btn-premium-toggle { background: #d4af37; color: white; }
        .btn-view { background: #3498db; color: white; text-decoration: none; display: inline-block; text-align: center; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        hr { margin: 40px 0; border: 0; border-top: 2px solid #eee; }
    </style>
</head>

    <script>
        const SUPABASE_URL = "https://maeoqoxzjzusjwrdrkbd.supabase.co";
        const SUPABASE_KEY = "sb_publishable_BpRfj-r2oCa-6m1XFdO6Uw_3-xGbzLX";

     async function inizializzaAdmin() {
    const { data: { user }, error } = await supabaseClient.auth.getUser(); // Aggiunto error

      async function caricaRecensioni() {
    const listaDiv = document.getElementById('lista-recensioni');
    
    // 1. Recuperiamo le recensioni
    const { data: recensioni, error } = await supabaseClient
        .from('RECENSIONI')
        .select('*')
        .order('created_at', { ascending: false });

    if (error) { listaDiv.innerHTML = "Errore: " + error.message; return; }

    // 2. Recuperiamo TUTTI i profili lavoratori in una volta sola per velocizzare
    const { data: profili } = await supabaseClient.from('esperienze_lavoratori').select('user_id, nome_reale, cognome_reale, data_nascita');
    listaDiv.innerHTML = "";

    recensioni.forEach(rec => {
        const card = document.createElement('div');
        card.className = 'review-card';
        const isVer = rec.VERIFICATA === true;
        const pathContratto = rec.URL_CONTRATTO ? rec.URL_CONTRATTO.replace('contratti/', '') : null;

        // 3. Cerchiamo se esiste un profilo per l'autore di questa recensione
        const profiloAutore = profili ? profili.find(p => p.user_id === rec.USER_HASH) : null;
        
        // Se troviamo il profilo mostriamo Nome e Cognome, altrimenti un messaggio di avviso
        const infoAutore = profiloAutore 
    ? `<b style="color:var(--blu)">👤 ${profiloAutore.nome_reale} ${profiloAutore.cognome_reale}</b> 
       <span style="font-size:12px; color:#666;">(Nato il: ${profiloAutore.data_nascita ? new Date(profiloAutore.data_nascita).toLocaleDateString('it-IT') : 'N/D'})</span>` 
    : `<span style="color:#e74c3c; font-size:11px;">⚠️ Profilo esperienza non creato</span>`;
        card.innerHTML = `
            <div class="card-top">
                <div>
                    <span class="status-badge ${isVer ? 'badge-verified' : 'badge-pending'}">${isVer ? '✅ Verificata' : '⏳ In Attesa'}</span>
                    <h2 style="margin:5px 0;">${rec.AZIENDA || 'Ignota'}</h2>
                    <div style="margin-top:5px; font-size:13px;">Inviata da: ${infoAutore}</div>
                </div>
                <button class="btn-delete" onclick="eliminaRecensione(${rec.id})">Elimina Tutto</button>
            </div>
            <div class="grid-details">
                <span>Paga: <b>${rec.PAGA_PUNTUALITA || 'N/D'}</b></span>
                <span>Professionalità: <b>${rec.RISPETTO_TITOLARE || 0}/5</b></span>
                <span>ID Autore: <small><code>${rec.USER_HASH.substring(0,8)}...</code></small></span>
            </div>
            <div class="action-bar">
                ${pathContratto ? `
                    <button class="btn-view" onclick="apriFile('${pathContratto}')">👁️ Vedi Prova</button>
                    <button class="btn-delete" style="background:#e67e22;" onclick="eliminaSoloProva(${rec.id}, '${pathContratto}')">🗑️ Elimina Prova</button>
                ` : '<small style="color:#999">Nessun file</small>'}
                ${!isVer ? `<button class="btn-verify" onclick="verificaRecensione(${rec.id})">✔️ Conferma Badge</button>` : ''}
            </div>
        `;
        listaDiv.appendChild(card);
    });
}

        async function apriFile(path) {
            const { data, error } = await supabaseClient.storage.from('contratti').createSignedUrl(path, 60);
            if (error) {
                alert("Errore nel caricamento del file: " + error.message);
                return;
            }
            if (data) window.open(data.signedUrl, '_blank');
        }
        async function eliminaSoloProva(idRecensione, pathFile) {
            if (!confirm("Sei sicura di voler eliminare definitivamente il documento? La recensione rimarrà, ma il file sparirà dallo storage.")) return;

            try {
                // 1. Elimina il file fisico dallo storage di Supabase
                const { error: storageError } = await supabaseClient
                    .storage
                    .from('contratti')
                    .remove([pathFile]);

                if (storageError) throw storageError;

                // 2. Rimuovi il link al file dal database (imposta URL_CONTRATTO a NULL)
                const { error: dbError } = await supabaseClient
                    .from('RECENSIONI')
                    .update({ URL_CONTRATTO: null })
                    .eq('id', idRecensione);

                if (dbError) throw dbError;

                alert("Documento rimosso con successo!");
                caricaRecensioni(); // Ricarica la lista per aggiornare la vista
            } catch (err) {
                console.error(err);
                alert("Errore durante l'eliminazione: " + err.message);
            }
        }

        async function verificaRecensione(id) {
            await supabaseClient.from('RECENSIONI').update({ VERIFICATA: true }).eq('id', id);
            caricaRecensioni();
        }

        async function eliminaRecensione(id) {
    if (!confirm("Sei sicuro di voler eliminare questa recensione? L'azione è irreversibile.")) return;

    const { error } = await supabaseClient
        .from('RECENSIONI')
        .delete()
        .eq('id', id); // Verifica che la colonna si chiami 'id' (minuscolo) o 'ID' (maiuscolo)

    if (error) {
        alert("Errore durante l'eliminazione: " + error.message);
        console.error("Dettaglio errore:", error);
    } else {
        alert("Recensione eliminata con successo.");
        location.reload(); // Ricarica la pagina per aggiornare la lista
    }
}

        async function caricaAziendeAdmin() {
            const listaDiv = document.getElementById('lista-aziende-admin');
            const { data: aziende, error } = await supabaseClient
                .from('profili_aziende')
                .select('*')
                .order('nome_azienda', { ascending: true });

            if (error) { listaDiv.innerHTML = "Errore: " + error.message; return; }

            listaDiv.innerHTML = "";
            aziende.forEach(az => {
                const card = document.createElement('div');
                card.className = 'review-card';
                const prem = az.is_premium === true;
                const approvata = az.is_approvata === true;

                const btnApprova = !approvata 
                    ? `<button id="btn-app-${az.id}" onclick="approvaAzienda('${az.id}')" style="background:#2ecc71; color:white;">✅ Approva</button>` 
                    : `<span style="color:#2ecc71; font-weight:bold; font-size:12px; margin-right:10px;">🛡️ APPROVATA</span>`;

                card.innerHTML = `
                    <div class="card-top">
                        <div>
                            <span class="status-badge" style="${prem ? 'background:#d4af37;color:white;' : 'background:#eee;'}">${prem ? '⭐ PREMIUM' : 'BASE'}</span>
                            <h2 style="margin:5px 0;">${az.nome_azienda}</h2>
                            <small>P.IVA: <b>${az.partita_iva}</b></small>
                        </div>
                        <div style="display:flex; gap:5px; align-items:center;">
                            ${btnApprova}
                            <button class="btn-view" onclick="window.open('https://ec.europa.eu/taxation_customs/vies/#/vat-validation', '_blank')">🔍 VIES</button>
                            <button class="btn-premium-toggle" onclick="togglePremium('${az.id}', ${prem})">${prem ? 'Togli Premium' : 'Rendi Premium'}</button>
                            <button class="btn-delete" onclick="eliminaAzienda('${az.id}')">🗑️</button>
                        </div>
                    </div>
                `;
                listaDiv.appendChild(card);
            });
        }

        async function approvaAzienda(id) {
            const { error } = await supabaseClient.from('profili_aziende').update({ is_approvata: true }).eq('id', id);
            if (error) alert("Errore: " + error.message);
            else { alert("Azienda approvata!"); caricaAziendeAdmin(); }
        }

        async function togglePremium(id, attuale) {
            const { error } = await supabaseClient.from('profili_aziende').update({ is_premium: !attuale }).eq('id', id);
            if (error) alert("Errore: " + error.message);
            else { 
                if (!attuale) await supabaseClient.from('richieste_premium').update({ stato: 'approvata' }).eq('azienda_id', id);
                alert("Piano Premium aggiornato!"); 
                caricaAziendeAdmin(); 
            }
        }

        async function eliminaAzienda(id) {
            if(confirm("Eliminare azienda?")) {
                await supabaseClient.from('profili_aziende').delete().eq('id', id);
                caricaAziendeAdmin();
            }
        }

async function logout() {
    if (!confirm("Vuoi uscire dalla sessione Admin?")) return;

    const { error } = await supabaseClient.auth.signOut();

    if (error) {
        alert("Errore durante il logout: " + error.message);
    } else {
        // Usiamo l'indirizzo della tua nuova home (index.html)
        window.location.replace('index.html');
    }
}
